# 生产环境 Docker Compose 配置
# 使用方法：docker compose -f docker-compose.production.yml up -d

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: clawhub
      POSTGRES_USER: clawhub
      # ⚠️ 生产环境必须修改密码！从环境变量读取
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}
    # ✅ 不暴露端口到公网
    expose:
      - "5432"
    volumes:
      - clawhub_db:/var/lib/postgresql/data
      - ./selfhost/db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U clawhub -d clawhub']
      interval: 2s
      timeout: 3s
      retries: 20
    restart: unless-stopped
    networks:
      - clawhub_internal

  api:
    build:
      context: .
      dockerfile: selfhost/api/Dockerfile
    working_dir: /app
    command: ['bun', 'selfhost/api/src/index.ts']
    environment:
      HOST: '0.0.0.0'
      PORT: '3000'
      DATABASE_URL: postgres://clawhub:${POSTGRES_PASSWORD:-CHANGE_ME_IN_PRODUCTION}@db:5432/clawhub
      STORAGE_DIR: /data/storage
      TRUST_FORWARDED_IPS: 'true'
      # ⚠️ 生产环境修改为实际域名
      WELL_KNOWN_API_BASE: ${API_BASE_URL:-https://your-domain.com}
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    # ✅ 不暴露端口，只通过 nginx 访问
    expose:
      - "3000"
    volumes:
      - clawhub_storage:/data/storage
    restart: unless-stopped
    networks:
      - clawhub_internal
    # 日志配置
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: selfhost/api/Dockerfile
    working_dir: /app
    # ⚠️ 生产环境应该用 build + preview，不是 dev server
    command: ['bun', 'run', 'build', '&&', 'bun', 'run', 'preview', '--host', '0.0.0.0', '--port', '5173']
    environment:
      VITE_SELFHOST_MODE: 'true'
      VITE_CONVEX_URL: ''
      PORT: '5173'
      NODE_ENV: production
    # ✅ 不暴露端口
    expose:
      - "5173"
    volumes:
      - ./src:/app/src
      - ./public:/app/public
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - clawhub_internal

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - web
    restart: unless-stopped
    networks:
      - clawhub_internal
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  clawhub_db:
  clawhub_storage:

networks:
  clawhub_internal:
    driver: bridge
